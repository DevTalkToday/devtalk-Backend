spring.application.name=demo
server.port=${PORT:4000}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/devtalk?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:${CORS_ALLOWED_ORIGIN:http://localhost:3000}}
app.github.client-id=${GITHUB_CLIENT_ID:}
app.github.client-secret=${GITHUB_CLIENT_SECRET:}
app.github.redirect-uri=${GITHUB_REDIRECT_URI:http://localhost:3000/auth/callback/github}
app.google.client-id=${GOOGLE_CLIENT_ID:}
app.google.client-secret=${GOOGLE_CLIENT_SECRET:}
app.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:3000/auth/callback/google}
app.auth.email-verification.expose-debug-code=${AUTH_EMAIL_VERIFICATION_EXPOSE_DEBUG_CODE:false}
app.auth.email-verification.from=${AUTH_EMAIL_VERIFICATION_FROM:${spring.mail.username:}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=5000
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.orm.jdbc.bind=warn
