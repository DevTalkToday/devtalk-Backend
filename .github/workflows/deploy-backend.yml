name: Deploy Backend To VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-backend-vm
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VM_KNOWN_HOSTS }}" | tr -d '\r' > ~/.ssh/known_hosts
          printf '%s\n' "${{ secrets.VM_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/known_hosts ~/.ssh/id_ed25519
          if ! ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null 2>&1; then
            echo "VM_SSH_KEY secret is invalid. Paste the exact contents of ~/.ssh/devtalk_vm_deploy and use a key without a passphrase."
            exit 1
          fi

      - name: Deploy on VM
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_PORT: ${{ secrets.VM_PORT }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o ConnectTimeout=15 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -p "$VM_PORT" "$VM_USER@$VM_HOST" <<'EOF'
          set -euo pipefail
          echo "[deploy] updating backend repository"
          cd ~/devtalk/devtalk-backend/demo
          git fetch origin main
          git checkout -B main origin/main

          cd ~/devtalk/deploy/gsmsv
          if [[ ! -f .env ]]; then
            echo "Missing deploy/gsmsv/.env"
            exit 1
          fi

          required_vars=(
            APP_ORIGIN
            MYSQL_DATABASE
            MYSQL_USER
            MYSQL_PASSWORD
            MYSQL_ROOT_PASSWORD
          )

          missing=()
          for key in "${required_vars[@]}"; do
            if ! grep -Eq "^${key}=.+" .env; then
              missing+=("$key")
            fi
          done

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "Missing required values in .env: ${missing[*]}"
            exit 1
          fi

          echo "[deploy] starting mysql"
          docker compose up -d mysql
          echo "[deploy] rebuilding backend only"
          docker compose up -d --build backend
          echo "[deploy] ensuring frontend and nginx stay up without rebuilding frontend"
          docker compose up -d --no-build frontend nginx

          verified=0
          for attempt in 1 2 3 4 5 6; do
            if docker compose ps \
              && docker compose exec -T nginx wget -qO- http://backend:4000/health > /dev/null \
              && docker compose exec -T nginx wget -qO- http://127.0.0.1/health > /dev/null; then
              verified=1
              break
            fi

            if [ "$attempt" -lt 6 ]; then
              echo "verify attempt $attempt failed, retrying in 5s..."
              sleep 5
            fi
          done

          if [ "$verified" -eq 1 ]; then
            echo "Deployment verification succeeded."
          else
            echo "Deployment verification failed after retries."
            exit 1
          fi

          follow_status="$(docker compose exec -T backend curl -s -o /tmp/follow-check-body -w '%{http_code}' http://127.0.0.1:4000/profile/1/follow || true)"
          if [ "$follow_status" != "405" ]; then
            echo "Follow endpoint verification failed. Expected 405, got ${follow_status}."
            docker compose exec -T backend sh -lc 'cat /tmp/follow-check-body || true'
            exit 1
          fi

          friend_status="$(docker compose exec -T backend curl -s -o /tmp/friend-check-body -w '%{http_code}' http://127.0.0.1:4000/friends/received-count || true)"
          if [ "$friend_status" != "401" ]; then
            echo "Friend count endpoint verification failed. Expected 401, got ${friend_status}."
            docker compose exec -T backend sh -lc 'cat /tmp/friend-check-body || true'
            exit 1
          fi

          message_status="$(docker compose exec -T backend curl -s -o /tmp/message-check-body -w '%{http_code}' http://127.0.0.1:4000/messages/unread-count || true)"
          if [ "$message_status" != "401" ]; then
            echo "Message unread endpoint verification failed. Expected 401, got ${message_status}."
            docker compose exec -T backend sh -lc 'cat /tmp/message-check-body || true'
            exit 1
          fi
          EOF
