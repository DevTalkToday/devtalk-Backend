name: Deploy Backend To VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-backend-vm
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VM_KNOWN_HOSTS }}" | tr -d '\r' > ~/.ssh/known_hosts
          printf '%s\n' "${{ secrets.VM_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/known_hosts ~/.ssh/id_ed25519
          if ! ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null 2>&1; then
            echo "VM_SSH_KEY secret is invalid. Paste the exact contents of ~/.ssh/devtalk_vm_deploy and use a key without a passphrase."
            exit 1
          fi

      - name: Deploy on VM
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_PORT: ${{ secrets.VM_PORT }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -p "$VM_PORT" "$VM_USER@$VM_HOST" <<'EOF'
          set -euo pipefail
          cd ~/devtalk/devtalk-backend/demo
          git fetch origin
          git checkout main
          git pull --ff-only origin main
          cd ~/devtalk/deploy/gsmsv
          bash start.sh

          for attempt in 1 2 3 4 5 6; do
            if bash verify.sh; then
              exit 0
            fi

            if [ "$attempt" -lt 6 ]; then
              echo "verify attempt $attempt failed, retrying in 5s..."
              sleep 5
            fi
          done

          echo "Deployment verification failed after retries."
          exit 1
          EOF
